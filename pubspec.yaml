name: ariela
description: "ARIELA — Understand your body, at every stage. An intelligent women's health companion."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & branding
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # State management
  flutter_riverpod: ^2.5.1

  # Localization (FR + EN)
  flutter_localizations:
    sdk: flutter
  intl: any

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Backend
  supabase_flutter: ^2.5.6

  # Utilities
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true